<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        *{
            color : #fff;
            font-family: myriad, klik, ubuntu, georgia, arial, serif;
            text-align: center;
            box-sizing: border-box;
        }

        body{
            margin: 0;
            background-color: #111;
        }

        input{
            background-color: #333;
        }

        .card-review{
            border : none;
            font-size : 4em;
            margin : 5%;
        }

        footer{
            position : fixed;
            bottom: 10px;
            right: 10px;
            text-decoration: none;
            color:#eee;
        }

        .card-edit, .deck{

            background-color: #444;
            float: left;
            margin: 10px;
            padding: 10px;
        }

        img{
            height: 400px; /* TODO : have it depend on the vh ! doesn't work for some reason */
            width : auto;
        }

        .management-shell{
            --bg: #09090b;
            --panel: #18181b;
            --panel-strong: #1f1f23;
            --border: #27272a;
            --border-strong: #3f3f46;
            --text: #fafafa;
            --muted: #a1a1aa;
            --muted-strong: #d4d4d8;
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.12);

            min-height: 100vh;
            padding: 44px clamp(18px, 4vw, 56px) 88px;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .management-shell,
        .management-shell *{
            text-align: left;
        }

        .management-shell a{
            text-decoration: none;
        }

        .management-header,
        .section-heading,
        .card-header,
        .card-actions,
        .action-row{
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .management-header{
            justify-content: space-between;
            margin: 0 auto 24px;
            max-width: 1180px;
        }

        .management-header h1,
        .section-heading h2,
        .card-header h3,
        .card-title{
            margin: 0;
            letter-spacing: 0;
        }

        .management-header h1{
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1;
        }

        .management-kicker,
        .muted,
        .field span,
        .badge{
            color: var(--muted);
        }

        .management-kicker{
            margin: 0 0 10px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .muted{
            margin: 8px 0 0;
            line-height: 1.5;
        }

        .management-panel,
        .management-card{
            max-width: 1180px;
            margin: 0 auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 18px 55px rgba(0, 0, 0, 0.22);
        }

        .management-panel{
            padding: clamp(18px, 3vw, 28px);
            margin-bottom: 24px;
        }

        .section-heading{
            justify-content: space-between;
            max-width: 1180px;
            margin: 0 auto 14px;
        }

        .section-heading h2{
            font-size: 1.1rem;
        }

        .management-grid{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            max-width: 1180px;
            margin: 0 auto;
        }

        .management-card{
            display: flex;
            flex-direction: column;
            float: none;
            gap: 16px;
            padding: 18px;
        }

        .card-header{
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-header h3,
        .card-title{
            min-width: 0;
            color: var(--text);
            font-size: 1rem;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .badge{
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 26px;
            padding: 0 10px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--panel-strong);
            font-size: 0.78rem;
            white-space: nowrap;
        }

        .form-grid{
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .form-stack{
            display: grid;
            gap: 14px;
        }

        .field{
            display: grid;
            gap: 7px;
            min-width: 0;
            font-size: 0.9rem;
        }

        .field span{
            font-size: 0.82rem;
            font-weight: 600;
        }

        .management-shell input[type="text"]{
            width: 100%;
            min-height: 38px;
            padding: 8px 11px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #09090b;
            color: var(--text);
            outline: none;
        }

        .management-shell input[type="text"]:focus{
            border-color: var(--border-strong);
            box-shadow: 0 0 0 3px rgba(250, 250, 250, 0.08);
        }

        .management-shell input[type="range"]{
            width: 100%;
            accent-color: var(--text);
        }

        .btn{
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 36px;
            padding: 0 13px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--panel-strong);
            color: var(--text);
            font-size: 0.88rem;
            font-weight: 650;
            line-height: 1;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-primary{
            border-color: var(--text);
            background: var(--text);
            color: #09090b;
        }

        .btn-secondary{
            background: #27272a;
        }

        .btn-ghost{
            background: transparent;
        }

        .btn-destructive{
            border-color: rgba(239, 68, 68, 0.45);
            background: var(--danger-bg);
            color: #fecaca;
        }

        .card-actions,
        .action-row{
            flex-wrap: wrap;
        }

        .inline-form{
            display: inline-flex;
            margin: 0;
        }

        .empty-state{
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--muted);
        }

        @media (max-width: 720px){
            .management-shell{
                padding: 28px 14px 82px;
            }

            .management-header,
            .form-grid{
                grid-template-columns: 1fr;
            }

            .management-header{
                display: grid;
                align-items: start;
            }

            .management-grid{
                grid-template-columns: 1fr;
            }

            .btn{
                width: 100%;
            }

            .card-actions,
            .action-row,
            .inline-form{
                width: 100%;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <a href="/">Review</a>
        <a href="/decks">Decks</a>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        // Add your custom JavaScript here
    </script>
</body>
</html>
